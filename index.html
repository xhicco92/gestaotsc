<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Centro Técnico - Painel de Monitorização</title>
    <link rel="stylesheet" href="styles.css">
    <!-- Opcional: Material Icons para consistência com o exemplo -->
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
</head>
<body>
    <div class="painel">
        <!-- Cabeçalho com data -->
        <div class="cabecalho">
            <h1>🔧 Centro Técnico - Painel de Monitorização</h1>
            <div class="data" id="dataAtual"></div>
        </div>

        <!-- Menu com os dois botões principais -->
        <div class="menu-principal">
            <button id="btnAbertos" class="botao-menu ativo">
                <span class="material-icons">folder_open</span> Abertos Área Técnica
            </button>
            <button id="btnProdutividade" class="botao-menu">
                <span class="material-icons">timeline</span> Produtividades
            </button>
        </div>

        <!-- Área de conteúdo dinâmico -->
        <div id="conteudo" class="conteudo">
            <!-- O conteúdo será carregado aqui pelo JavaScript -->
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
