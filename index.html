<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Centro Técnico</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <div class="dashboard">
        <!-- Header com saudação -->
        <header class="header">
            <div class="header-content">
                <div class="logo-area">
                    <i class="fas fa-tools"></i>
                    <h1>Centro Técnico</h1>
                </div>
                <div class="user-area">
                    <span class="user-name">Técnico Responsável</span>
                    <i class="fas fa-user-circle user-avatar"></i>
                </div>
            </div>
        </header>

        <!-- Cards de métricas rápidas -->
        <div class="metricas-rapidas">
            <div class="metrica-card">
                <div class="metrica-icon" style="background: #e3f2fd; color: #1976d2;">
                    <i class="fas fa-clipboard-list"></i>
                </div>
                <div class="metrica-info">
                    <span class="metrica-label">OS em Aberto</span>
                    <span class="metrica-valor">24</span>
                </div>
            </div>
            <div class="metrica-card">
                <div class="metrica-icon" style="background: #e8f5e9; color: #388e3c;">
                    <i class="fas fa-check-circle"></i>
                </div>
                <div class="metrica-info">
                    <span class="metrica-label">Concluídas Hoje</span>
                    <span class="metrica-valor">8</span>
                </div>
            </div>
            <div class="metrica-card">
                <div class="metrica-icon" style="background: #fff3e0; color: #f57c00;">
                    <i class="fas fa-clock"></i>
                </div>
                <div class="metrica-info">
                    <span class="metrica-label">Em Andamento</span>
                    <span class="metrica-valor">12</span>
                </div>
            </div>
            <div class="metrica-card">
                <div class="metrica-icon" style="background: #fce4ec; color: #c2185b;">
                    <i class="fas fa-users"></i>
                </div>
                <div class="metrica-info">
                    <span class="metrica-label">Técnicos Ativos</span>
                    <span class="metrica-valor">6</span>
                </div>
            </div>
        </div>

        <!-- Menu principal com botões -->
        <div class="menu-principal">
            <button class="btn-menu btn-abertos" onclick="mostrarAbertos()">
                <i class="fas fa-folder-open"></i>
                <span>Abertos</span>
                <small>Área Técnica</small>
            </button>
            <button class="btn-menu btn-produtividade" onclick="mostrarProdutividade()">
                <i class="fas fa-chart-line"></i>
                <span>Produtividade</span>
                <small>Desempenho da equipe</small>
            </button>
        </div>

        <!-- Área de conteúdo principal -->
        <div class="content-wrapper" id="conteudo">
            <div class="welcome-message">
                <i class="fas fa-hand-peace"></i>
                <h2>Bem-vindo ao Dashboard</h2>
                <p>Selecione uma opção para visualizar as informações</p>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
