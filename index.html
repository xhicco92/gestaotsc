<!DOCTYPE html>
<html lang="pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Centro Técnico</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>DASHBOARD CENTRO TÉCNICO</h1>
        </header>
        
        <div class="botoes-principais">
            <button class="botao-abertos" onclick="mostrarAbertos()">
                ABERTOS ÁREA TÉCNICA
            </button>
            <button class="botao-produtividade" onclick="mostrarProdutividade()">
                PRODUTIVIDADES
            </button>
        </div>

        <div id="conteudo" class="conteudo">
            <p class="mensagem-inicial">Clique num botão para começar</p>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
